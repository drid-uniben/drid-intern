services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-runner
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4003:4000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-runner
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "3003:3000"
    restart: unless-stopped