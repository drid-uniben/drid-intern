name: Deploy Container

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: drid-uniben.org
      DEPLOY_USER: github-drid-deploy-user

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        run: |
          IMAGE=ghcr.io/drid-uniben/drid-intern-backend

          docker buildx build \
            --push \
            -t $IMAGE:${GITHUB_SHA} \
            -t $IMAGE:latest \
            -f backend/Dockerfile \
            backend

      - name: Build and push frontend image
        run: |
          IMAGE=ghcr.io/drid-uniben/drid-intern-frontend

          docker buildx build \
            --push \
            -t $IMAGE:${GITHUB_SHA} \
            -t $IMAGE:latest \
            -f frontend/Dockerfile \
            frontend
                  
      - name: Deploy via SSH
        # if: 1==2 # Temporarily disable deployment for testing
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd drid-intern
            ./deploy-drid-intern.sh 