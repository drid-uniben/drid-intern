name: Deploy Container

on:
  push:
    branches: [main, staging]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:                           
      DEPLOY_HOST: drid-uniben.org
      DEPLOY_USER: github-drid-deploy-user
      BUILD_REQUIRED: 1

    steps:
      - name: Determine if build is needed
        id: check_build
        run: |
          if git diff --name-only ${{ github.sha }}~1 ${{ github.sha }} | grep -E 'client|ws-server|.'; then
            echo "BUILD_REQUIRED=1" >> $GITHUB_ENV
          fi
          echo "Build required: $BUILD_REQUIRED"

      - name: Checkout code
        if: env.BUILD_REQUIRED == '1'
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        if: env.BUILD_REQUIRED == '1'
        uses: docker/setup-buildx-action@v2

      - name: Login to GHCR
        if: env.BUILD_REQUIRED == '1'
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.BUILD_REQUIRED == '1'
        run: |
          IMAGE=ghcr.io/drid-uniben/drid-intern

          docker buildx build \
            --push \
            -t $IMAGE:${GITHUB_SHA} \
            -t $IMAGE:latest \
            .
                  
      - name: Deploy via SSH
        # if: 1==2 # Temporarily disable deployment for testing
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd drid-intern
            ./deploy-drid-intern.sh 