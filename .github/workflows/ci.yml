name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:

  frontend:
    name: Frontend lint/build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build


  backend:
    name: Backend lint/build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d testdb"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test

      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testdb

      FRONTEND_URL: http://localhost:3000
      API_URL: http://localhost:4000

      JWT_ACCESS_SECRET: ci_secret_access_key_at_least_32_chars_long
      JWT_REFRESH_SECRET: ci_secret_refresh_key_at_least_32_chars_long

      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: test
      SMTP_PASS: testpassword
      EMAIL_FROM: test@example.com

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml


      - name: Install dependencies
        run: pnpm install --frozen-lockfile


      # CRITICAL: Generate Prisma client
      - name: Prisma generate
        run: pnpm prisma generate


      # Apply migrations
      - name: Prisma migrate deploy
        run: pnpm prisma migrate deploy


      - name: Lint
        run: pnpm lint


      - name: Build
        run: pnpm build


      # Optional but recommended if you have tests
      # - name: Test
      #   run: pnpm test
